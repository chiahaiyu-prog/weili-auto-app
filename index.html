<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>威力彩神級分析 Pro Max</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="app">

<section class="hero">
  <h1>威力彩神級分析</h1>
  <p class="sub">AI 自動抓最新開獎・歷史規律演算・每期重新分析</p>
</section>

<section class="card">
  <h2>最新一期刪除</h2>
  <div id="latest" class="nums">載入中...</div>
</section>

<section class="card hot">
  <h2>🔥 最兇 6 顆</h2>
  <div id="top6" class="bigNums">載入中...</div>
</section>

<section class="card">
  <h2>🔥 衝頭獎 3 組</h2>
  <div id="groups">載入中...</div>
</section>

<section class="card">
  <h2>第二區最強</h2>
  <div id="second" class="bigNums">載入中...</div>
</section>

<section class="card">
  <h2>全部剩餘可能號碼</h2>
  <div id="all" class="grid">載入中...</div>
</section>

<p class="note">⚠️ 本分析依歷史資料演算，僅供參考。</p>

</main>

<script>
async function loadData(){
  const res = await fetch("/api/analyze");
  const data = await res.json();

  document.getElementById("latest").innerHTML =
    data.latest.first.join("、")+"　第二區："+data.latest.second;

  const top6 = data.top16.slice(0,6);
  document.getElementById("top6").innerHTML =
    top6.map(x=>`<span>${x.number}</span>`).join("");

  const pool = data.top16.map(x=>x.number);

  const groups = [
    pool.slice(0,6),
    [pool[0],pool[2],pool[4],pool[6],pool[8],pool[10]].filter(Boolean),
    [pool[1],pool[3],pool[5],pool[7],pool[9],pool[11]].filter(Boolean)
  ];

  document.getElementById("groups").innerHTML = groups.map((g,i)=>`
    <div class="group"><b>第 ${i+1} 組：</b>${g.join("、")}</div>
  `).join("");

  document.getElementById("second").innerHTML =
    data.secondArea.slice(0,2).map(x=>`<span>${x.number}</span>`).join("");

  document.getElementById("all").innerHTML =
    data.finalNumbers.map(x=>`
      <div class="numBox">
        <b>${x.number}</b>
        <small>分數 ${x.score}</small>
      </div>
    `).join("");
}
loadData();
</script>

</body>
</html>
