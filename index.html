<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>威力彩自動開法分析 App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="tag">AUTO WEILI ANALYZER</p>
        <h1>威力彩自動開法分析</h1>
        <p class="sub">不用輸入號碼，系統自動抓最新資料，分析歷史對應開法，刪除近期重複區，再顯示可能號碼。</p>
      </div>
      <button id="refreshBtn">重新分析</button>
    </section>

    <section class="card status">
      <div>
        <span>最新一期第一區</span>
        <div id="latestFirst" class="balls"></div>
      </div>
      <div>
        <span>第二區</span>
        <div id="latestSecond" class="balls second"></div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>最可能號碼 Top 16</h2>
        <div id="topNumbers" class="balls big"></div>
      </div>
      <div class="card">
        <h2>第二區參考</h2>
        <div id="secondArea" class="balls second"></div>
      </div>
    </section>

    <section class="card">
      <h2>刪除規則</h2>
      <div class="rules">
        <div><b>灰色區｜近三期開過</b><p id="greyRemove"></p></div>
        <div><b>太熱｜近十期開 3 次以上</b><p id="tooHotRemove"></p></div>
        <div><b>最新一期刪除</b><p id="latestRemove"></p></div>
      </div>
    </section>

    <section class="card">
      <h2>全部剩餘可能號碼</h2>
      <div id="allNumbers" class="table"></div>
    </section>

    <p class="note">⚠️ 彩券沒有保證中獎，本 App 只是依歷史資料做參考分析。</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
