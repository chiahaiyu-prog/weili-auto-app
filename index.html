<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>威力彩神級分析</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="app">
  <section class="hero">
    <h1>威力彩神級分析</h1>
    <p class="sub">最強形式模型・歷史盲測推演・每期自動更新</p>
  </section>

  <section class="card">
    <h2>最新一期刪除</h2>
    <div id="latest" class="nums">載入中...</div>
  </section>

  <section class="card hot">
    <h2>🔥 最強 6 顆</h2>
    <div id="best6" class="bigNums">載入中...</div>
  </section>

  <section class="card">
    <h2>📊 真盲測推演 %</h2>
    <div id="backtest" class="stats">載入中...</div>
  </section>

  <section class="card">
    <h2>第二區推薦</h2>
    <div id="second" class="bigNums">載入中...</div>
  </section>

  <section class="card">
    <h2>形式結構</h2>
    <div id="formInfo" class="stats">載入中...</div>
  </section>

  <p class="note">⚠️ 歷史盲測只代表過去推演結果，不保證未來中獎。</p>
</main>

<script>
async function loadData() {
  try {
    const res = await fetch("/api/analyze");
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    document.getElementById("latest").innerHTML =
      data.latest.first.join("、") + "　第二區：" + data.latest.second;

    document.getElementById("best6").innerHTML =
      data.form.numbers.map(n => `<span>${n}</span>`).join("");

    document.getElementById("backtest").innerHTML = `
      <div class="statBox">盲測期數：<b>${data.backtest.total}</b></div>
      <div class="statBox">平均命中：<b>${data.backtest.averageHits}</b> 顆</div>
      <div class="statBox">中 1 顆以上：<b>${data.backtest.hit1Rate}%</b></div>
      <div class="statBox">中 2 顆以上：<b>${data.backtest.hit2Rate}%</b></div>
      <div class="statBox">中 3 顆以上：<b>${data.backtest.hit3Rate}%</b></div>
      <div class="statBox">中 4 顆以上：<b>${data.backtest.hit4Rate}%</b></div>
    `;

    document.getElementById("second").innerHTML =
      data.secondArea.slice(0, 2).map(x => `<span>${x.number}</span>`).join("");

    document.getElementById("formInfo").innerHTML = `
      <div class="statBox">奇偶：<b>${data.form.oddEven}</b></div>
      <div class="statBox">和值：<b>${data.form.sum}</b></div>
      <div class="statBox">低區：<b>${data.form.low}</b> 顆</div>
      <div class="statBox">中區：<b>${data.form.mid}</b> 顆</div>
      <div class="statBox">高區：<b>${data.form.high}</b> 顆</div>
    `;
  } catch (err) {
    document.body.innerHTML =
      `<h2 style="color:white;padding:30px;">錯誤：${err.message}</h2>`;
  }
}

loadData();
</script>

</body>
</html>
